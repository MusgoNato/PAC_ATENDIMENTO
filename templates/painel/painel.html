<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 50px;
      background: linear-gradient(120deg, #078282 100%, #acb6e0 100%);
      color: var(--text); 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
    }

    /* Texto rolando fora da caixa */
    .faixa {
      width: 100%;
      overflow: hidden;
      border-bottom: 1px solid black;
      margin-bottom: 20px; /* espaço entre faixa e painel */
      position: relative;
      height: 30px;
    }

    .texto-rolando {
      white-space: nowrap;
      font-size: 1.5em;
      font-weight: bold;
      justify-content: center;
      align-items: center;
      color: #070707;
      animation: mover 15s linear infinite;
    }

    @keyframes mover {
      from {
        transform: translateX(-100%);
      }
      to {
        transform: translateX(100%);
      }
    }

    .painel {
      display: grid;
      grid-template-areas:
        "topo topo topo"
        "esq meio dir";
      grid-gap: 70px;
      justify-items: center;
      align-items: center;
    }

    .painel > div {
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      font-weight: bold;
      color: #000000;
      text-align: center;
      justify-content: center;
      align-items: center;
    }

    .topo {
      grid-area: topo;
      width: 500px;
      height: 300px;
      border: 3px solid black;
      font-size: 5.5em;
      background: linear-gradient(120deg, #c3ffff 100%, #81c784 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .guiche {
      width: 320px;
      height: 220px;
      border: 3px solid black;
      font-size: 1.2em;
      background: linear-gradient(120deg, #c3ffff 100%, #81c784 100%);
      position: relative;
    }

    .titulo {
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 1.2em;
    }

    .conteudo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5em;
    }
    .fade-out {
      animation: fadeOut 0.7s forwards;
    }
    .fade-in {
      animation: fadeIn 0.7s;
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Texto rolando fora da caixa -->
  <div class="faixa">
    <div class="texto-rolando">PAC - Sua senha será chamada em instantes!</div>
  </div>

  <div class="painel">
  <div class="topo" id="painel-topo"><span id="topo-texto">P234</span></div>

    <div class="guiche esq">
      <div class="titulo">GUICHÊ 1</div>
      <div class="conteudo" id="guiche1-conteudo">101</div>
    </div>

    <div class="guiche meio">
      <div class="titulo">GUICHÊ 2</div>
      <div class="conteudo">202</div>
    </div>

    <div class="guiche dir">
      <div class="titulo">GUICHÊ 3</div>
      <div class="conteudo">303</div>
    </div>
  </div>
  <script src="/static/js.js"></script>
</body>
</html>
